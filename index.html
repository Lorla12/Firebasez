    <!-- Paystack Integration Script -->
    <script>
        document.getElementById('paystack-btn').addEventListener('click', function(e) {
            e.preventDefault();
            
            // Generate a random reference for the transaction
            const uniqueRef = 'FBZ-' + Math.floor((Math.random() * 1000000000) + 1);

            // Setup Paystack payment
            const handler = PaystackPop.setup({
                // Your Test Public Key
                key: 'pk_test_1a06d3876580e5b945916e8363f36fe74aa75041', 
                email: 'testuser@example.com', // In a real app, you'd capture the user's email
                
                // $30 = GHS 345.77 (Paystack requires the amount in pesewas, so 34577)
                amount: 34577, 
                
                // I HAVE REMOVED THE CURRENCY LINE. 
                // This forces Paystack to use your account's default currency.
                ref: uniqueRef, 
                callback: function(response) {
                    // This happens when the payment is successful
                    alert('Payment successful! Transaction reference: ' + response.reference);
                    // You can redirect the user to a success page here:
                    // window.location.href = '/success.html?ref=' + response.reference;
                },
                onClose: function() {
                    // This happens if the user closes the modal without paying
                    alert('Payment window closed.');
                }
            });
            
            // Open the Paystack modal
            handler.openIframe();
        });
    </script>
