    <!-- Paystack Integration Script -->
    <script>
        document.getElementById('paystack-btn').addEventListener('click', function(e) {
            e.preventDefault();
            
            // 1. Get the email the user typed in
            const userEmail = document.getElementById('email-input').value;
            
            // Basic validation to make sure they typed an email
            if(!userEmail) {
                alert('Please enter your email address to continue.');
                return;
            }

            // 2. Generate a random reference for the transaction
            const uniqueRef = 'FBZ-' + Math.floor((Math.random() * 1000000000) + 1);

            // 3. Setup Paystack payment
            const handler = PaystackPop.setup({
                key: 'pk_test_1a06d3876580e5b945916e8363f36fe74aa75041', 
                email: userEmail, 
                amount: 34577, // $30 USD = GHS 345.77 (in pesewas)
                currency: 'GHS', // Explicitly telling Paystack to use GHS
                ref: uniqueRef, 
                callback: function(response) {
                    // 4. Hide the payment area and show the success area
                    document.getElementById('payment-area').classList.add('hidden');
                    document.getElementById('success-area').classList.remove('hidden');
                    
                    // 5. Display the transaction reference to the user
                    document.getElementById('ref-display').textContent = response.reference;
                },
                onClose: function() {
                    console.log('Payment window closed.');
                }
            });
            
            // Open the Paystack modal
            handler.openIframe();
        });
    </script>
